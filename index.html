<!DOCTYPE html>
<html>
<head>
  <title>Reward Zone 2.0</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; text-align: center; background: #f0f2f5; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
    .box { background: white; padding: 25px 15px; width: 95%; max-width: 420px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); position: relative; min-height: 500px; display: flex; flex-direction: column; }
    
    /* Math Display */
    .question { font-size: 40px; font-weight: bold; margin: 15px 0; color: #333; }
    
    /* Spelling Grid */
    .letter-grid { display: flex; justify-content: center; gap: 5px; margin: 20px 0; flex-wrap: wrap; }
    .letter-box { width: 35px; height: 45px; font-size: 24px; text-align: center; border: 2px solid #ddd; border-radius: 5px; text-transform: lowercase; font-weight: bold; }
    .letter-box:disabled { background: #f9f9f9; color: #555; border-color: #bbb; }
    .letter-box:focus { border-color: #4CAF50; outline: none; background: #f0fff0; }

    /* Inputs & Buttons */
    #mathInput { font-size: 28px; padding: 10px; width: 120px; border: 2px solid #ddd; border-radius: 10px; text-align: center; }
    button { font-size: 18px; padding: 12px 25px; background: #4CAF50; color: white; border: none; border-radius: 10px; cursor: pointer; margin: 10px; font-weight: bold; }
    #modeBtn { background: #9c27b0; font-size: 12px; padding: 5px 10px; align-self: center; }
    #speakBtn { background: #2196F3; border-radius: 50%; width: 60px; height: 60px; font-size: 30px; line-height: 60px; padding: 0; }

    /* Visual Help Area */
    #helpArea { margin-top: auto; padding: 10px; background: #fffde7; border-radius: 10px; border: 1px dashed #fbc02d; min-height: 60px; font-size: 14px; }
    .dot { display: inline-block; width: 8px; height: 8px; background: #fbc02d; border-radius: 50%; margin: 2px; }
    .dot-group { display: inline-block; margin: 0 5px; vertical-align: middle; }

    #message { font-weight: bold; font-size: 18px; margin: 10px 0; min-height: 25px; }
    #score { font-size: 12px; color: #666; background: #eee; padding: 5px 10px; border-radius: 15px; margin-top: 5px; }
    #resetBtn { position: absolute; bottom: 5px; left: 5px; font-size: 9px; opacity: 0.5; }
  </style>
</head>
<body>

<div class="box">
  <button id="modeBtn" onclick="toggleMode()">Switch Mode</button>
  <h3 style="margin:0">Reward Zone 💰</h3>
  
  <div id="score"></div>

  <div id="mathArea">
    <div class="question" id="mathQuestion"></div>
    <input type="number" id="mathInput" placeholder="?">
  </div>

  <div id="spellingArea" style="display:none;">
    <button id="speakBtn" onclick="sayWord()">🔊</button>
    <div class="letter-grid" id="letterGrid"></div>
  </div>

  <p id="message"></p>
  <button id="submitBtn" onclick="checkAnswer()">Submit Answer</button>

  <div id="helpArea" id="helpArea">
    <div id="helpText">Try your best!</div>
    <div id="visualAid"></div>
  </div>

  <button id="resetBtn" onclick="resetPrompt()">Reset</button>
</div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT6laLcpDJNQ4Lo99PY6WixZYa-I7DQJjskjc1teW22s2YQtcLBRmKPs6g94xQ7Du9FxuXGFYksIwst/pub?gid=0&single=true&output=csv';

let mode = "math", spellingWords = ["apple"], currentWord = "";
let num1, num2, operator, correctAnswer, attempts = 0, penaltyApplied = false;
let score = parseFloat(localStorage.getItem("balance")) || 0;
let dailyMath = parseInt(localStorage.getItem("mathToday")) || 0;
let dailySpell = parseInt(localStorage.getItem("spellToday")) || 0;

// Audio Setup
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(type) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  
  if (type === 'success') {
    osc.type = 'sine'; osc.frequency.setValueAtTime(800, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
    osc.start(); osc.stop(audioCtx.currentTime + 0.3);
  } else {
    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(100, audioCtx.currentTime);
    osc.frequency.linearRampToValueAtTime(50, audioCtx.currentTime + 0.4);
    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
    osc.start(); osc.stop(audioCtx.currentTime + 0.4);
  }
}

// Load Words
fetch(CSV_URL).then(r => r.text()).then(d => {
  spellingWords = d.split(/\r?\n/).map(w => w.trim().toLowerCase()).filter(w => w.length > 1);
});

function toggleMode() {
  mode = (mode === "math") ? "spelling" : "math";
  document.getElementById("mathArea").style.display = (mode === "math") ? "block" : "none";
  document.getElementById("spellingArea").style.display = (mode === "spelling") ? "block" : "none";
  nextTask();
}

function nextTask() {
  attempts = 0; penaltyApplied = false;
  document.getElementById("message").innerText = "";
  document.getElementById("visualAid").innerHTML = "";
  document.getElementById("helpText").innerText = "You can do it!";
  
  if (mode === "math") generateMath();
  else generateSpelling();
  updateScore();
}

function generateMath() {
  operator = Math.random() > 0.5 ? "+" : "-";
  num1 = Math.floor(Math.random() * 11) + 10;
  num2 = Math.floor(Math.random() * 9) + 2;
  if (operator === "-" && num2 > num1) [num1, num2] = [num2, num1];
  correctAnswer = (operator === "+") ? num1 + num2 : num1 - num2;
  document.getElementById("mathQuestion").innerText = `${num1} ${operator} ${num2}`;
  document.getElementById("mathInput").value = "";
  document.getElementById("mathInput").focus();
}

function generateSpelling() {
  currentWord = spellingWords[Math.floor(Math.random() * spellingWords.length)];
  const grid = document.getElementById("letterGrid");
  grid.innerHTML = "";
  
  for (let i = 0; i < currentWord.length; i++) {
    const input = document.createElement("input");
    input.className = "letter-box";
    input.maxLength = 1;
    input.dataset.index = i;
    
    // Fill first and last
    if (i === 0) { input.value = currentWord[0]; input.disabled = true; }
    else if (i === currentWord.length - 1) { input.value = currentWord[i]; input.disabled = true; }
    
    input.oninput = (e) => {
      if (e.target.value && i < currentWord.length - 2) {
        grid.children[i + 1].focus();
      }
    };
    grid.appendChild(input);
  }
  setTimeout(() => grid.children[1].focus(), 500);
  sayWord();
}

function sayWord() {
  window.speechSynthesis.cancel();
  let m = new SpeechSynthesisUtterance(currentWord);
  m.rate = 0.7; window.speechSynthesis.speak(m);
}

function showMathHelp() {
  const aid = document.getElementById("visualAid");
  aid.innerHTML = "";
  document.getElementById("helpText").innerText = "Count the dots:";
  
  function createDots(n, color) {
    const span = document.createElement("div");
    span.className = "dot-group";
    for(let i=0; i<n; i++) {
      const d = document.createElement("div");
      d.className = "dot";
      if(color) d.style.background = color;
      span.appendChild(d);
    }
    return span;
  }
  aid.appendChild(createDots(num1, "#2196F3"));
  const op = document.createElement("span");
  op.innerText = operator;
  op.style.fontSize = "20px";
  aid.appendChild(op);
  aid.appendChild(createDots(num2, "#f44336"));
}

function checkAnswer() {
  let userAns = "";
  if (mode === "math") {
    userAns = document.getElementById("mathInput").value;
  } else {
    const boxes = document.querySelectorAll(".letter-box");
    boxes.forEach(b => userAns += b.value);
  }

  if (!userAns) return;

  const isCorrect = (mode === "math") ? (parseInt(userAns) === correctAnswer) : (userAns.toLowerCase() === currentWord);

  if (isCorrect) {
    playSound('success');
    let reward = 0;
    if (mode === "math" && dailyMath < 20) { reward = 0.10; dailyMath++; }
    if (mode === "spelling" && dailySpell < 10) { reward = 0.15; dailySpell++; }
    score += reward;
    document.getElementById("message").style.color = "green";
    document.getElementById("message").innerText = "Excellent! +$" + reward.toFixed(2);
    setTimeout(nextTask, 1500);
  } else {
    attempts++;
    playSound('error');
    if (!penaltyApplied) {
      score = Math.max(0, score - 0.03);
      penaltyApplied = true;
      document.getElementById("message").innerText = "Oops! -3¢ Penalty";
    }
    
    if (mode === "math") showMathHelp();

    if (attempts >= 3) {
      document.getElementById("message").innerText = "The answer was: " + (mode === "math" ? correctAnswer : currentWord);
      setTimeout(nextTask, 3000);
    } else {
      document.getElementById("message").style.color = "red";
      document.getElementById("message").innerText = "Try again!";
    }
  }
  updateScore();
}

function updateScore() {
  document.getElementById("score").innerHTML = `Balance: $${score.toFixed(2)} | Math: ${dailyMath}/20 | Spell: ${dailySpell}/10`;
  localStorage.setItem("balance", score.toFixed(2));
  localStorage.setItem("mathToday", dailyMath);
  localStorage.setItem("spellToday", dailySpell);
}

function resetPrompt() {
  let b = Math.floor(Math.random()*5)+11;
  if(prompt(`Parent check: ${b}x${b}?`) == b*b) {
    score = 0; dailyMath = 0; dailySpell = 0;
    updateScore(); nextTask();
  }
}

nextTask();
</script>
</body>
</html>
