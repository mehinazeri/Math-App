<!DOCTYPE html>
<html>
<head>
  <title>Melorin's Token Zone</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; text-align: center; background: #f0f2f5; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
    .box { background: white; padding: 15px; width: 95%; max-width: 440px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); position: relative; height: 94vh; display: flex; flex-direction: column; overflow: hidden; }
    
    .top-stats { display: flex; justify-content: space-around; margin-bottom: 10px; }
    .stat-pill { background: #ede7f6; color: #512da8; padding: 5px 15px; border-radius: 15px; font-size: 14px; font-weight: bold; border: 1px solid #d1c4e9; }
    
    #modeBtn { background: #9c27b0; font-size: 11px; padding: 6px 15px; border-radius: 15px; color: white; border: none; cursor: pointer; margin-bottom: 10px; align-self: center; }

    .question { font-size: 36px; font-weight: bold; margin: 5px 0; color: #333; }
    #mathInput { font-size: 28px; padding: 8px; width: 100px; border: 2px solid #ddd; border-radius: 10px; text-align: center; }
    
    .letter-grid { display: flex; justify-content: center; gap: 4px; margin: 10px 0; flex-wrap: wrap; }
    .letter-box { width: 32px; height: 42px; font-size: 20px; text-align: center; border: 2px solid #ddd; border-radius: 5px; text-transform: lowercase; font-weight: bold; }
    .letter-box:focus { border-color: #4CAF50; outline: none; background: #f0fff0; }

    /* Visual Help Area */
    #helpArea { margin: 10px 0; padding: 10px; background: #fffde7; border-radius: 12px; border: 1px dashed #fbc02d; flex-grow: 1; display: flex; flex-direction: column; overflow-y: auto; }
    .help-title { font-size: 11px; font-weight: bold; color: #856404; margin-bottom: 5px; text-transform: uppercase; }
    
    /* Dot Visuals Fixed */
    .ten-frame-grid { display: flex; flex-wrap: wrap; gap: 4px; width: 140px; margin: 0 auto; justify-content: flex-start; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: #2196F3; flex-shrink: 0; }
    .dot.secondary { background: #f44336; }
    .dot.dim { background: #e0e0e0; border: 1px solid #ccc; }
    
    .math-grid-box { display: flex; flex-direction: column; gap: 3px; align-items: center; margin: 5px 0; }
    .grid-row { display: flex; gap: 3px; }
    .division-group { border: 1px solid #ddd; padding: 5px; border-radius: 6px; display: inline-block; margin: 3px; background: white; }

    button#submitBtn { font-size: 20px; padding: 12px 40px; background: #4CAF50; color: white; border: none; border-radius: 15px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 0 #388E3C; }
    #speakBtn { background: #2196F3; border-radius: 50%; width: 50px; height: 50px; font-size: 25px; color: white; border: none; cursor: pointer; }

    #message { font-weight: bold; font-size: 18px; margin: 5px 0; height: 30px; }
    #resetBtn { position: absolute; top: 5px; left: 5px; font-size: 9px; opacity: 0.2; background: none; border: none; cursor: pointer; }

    /* Progress & Bottom Info */
    .bottom-tokens { background: #fafafa; border-top: 2px solid #eee; padding: 10px; margin-top: 10px; }
    .progress-container { width: 100%; height: 20px; background: #e0e0e0; border-radius: 10px; margin: 8px 0; overflow: hidden; border: 1px solid #ccc; }
    #progressBar { height: 100%; width: 0%; background: linear-gradient(90deg, #ff5252, #ff1744); transition: width 0.5s; }
    .token-labels { display: flex; justify-content: space-between; font-size: 13px; font-weight: bold; }

    .confetti { position: fixed; width: 8px; height: 8px; z-index: 999; pointer-events: none; }
    @keyframes fall { 0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(720deg); opacity: 0; } }
  </style>
</head>
<body>

<div class="box">
  <button id="resetBtn" onclick="resetPrompt()">Admin</button>
  
  <div class="top-stats">
    <div class="stat-pill">Math: <span id="mathCount">0</span>/20</div>
    <div class="stat-pill">Spell: <span id="spellCount">0</span>/30</div>
  </div>

  <button id="modeBtn" onclick="toggleMode()">Switch to Spelling</button>

  <div id="mathArea">
    <div class="question" id="mathQuestion"></div>
    <input type="number" id="mathInput" placeholder="?">
  </div>

  <div id="spellingArea" style="display:none;">
    <button id="speakBtn" onclick="sayWord()">🔊</button>
    <div class="letter-grid" id="letterGrid"></div>
  </div>

  <p id="message"></p>
  <button id="submitBtn" onclick="checkAnswer()">Submit</button>

  <div id="helpArea">
    <div class="help-title" id="helpTitle">Helper</div>
    <div id="visualAid"></div>
  </div>

  <div class="bottom-tokens">
    <div class="token-labels">
      <span>Today: <span id="todayTokens">0</span> / 300</span>
      <span>Total: <span id="totalTokens">0</span> 🪙</span>
    </div>
    <div class="progress-container">
      <div id="progressBar"></div>
    </div>
  </div>
</div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT6laLcpDJNQ4Lo99PY6WixZYa-I7DQJjskjc1teW22s2YQtcLBRmKPs6g94xQ7Du9FxuXGFYksIwst/pub?gid=0&single=true&output=csv';

let mode = "math", spellingWords = ["apple"], currentWord = "";
let num1, num2, operator, correctAnswer, attempts = 0, penaltyApplied = false;

let totalTokens = parseInt(localStorage.getItem("totalTokens")) || 0;
let mathToday = parseInt(localStorage.getItem("mathToday")) || 0;
let spellToday = parseInt(localStorage.getItem("spellToday")) || 0;
let tokensToday = parseInt(localStorage.getItem("tokensToday")) || 0;
let errorLog = JSON.parse(localStorage.getItem("errorLog")) || [];
let savedDate = localStorage.getItem("savedDate");
let todayDate = new Date().toDateString();

if (savedDate !== todayDate) {
    mathToday = 0; spellToday = 0; tokensToday = 0;
    localStorage.setItem("savedDate", todayDate);
}

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(isSuccess) {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.connect(g); g.connect(audioCtx.destination);
    if (isSuccess) {
        osc.frequency.setValueAtTime(600, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(1000, audioCtx.currentTime + 0.1);
        g.gain.setValueAtTime(0.1, audioCtx.currentTime);
        osc.start(); osc.stop(audioCtx.currentTime + 0.2);
    } else {
        osc.type = 'sawtooth'; osc.frequency.setValueAtTime(110, audioCtx.currentTime);
        osc.frequency.linearRampToValueAtTime(50, audioCtx.currentTime + 0.4);
        g.gain.setValueAtTime(0.15, audioCtx.currentTime);
        osc.start(); osc.stop(audioCtx.currentTime + 0.4);
    }
}

function createConfetti() {
    for (let i = 0; i < 40; i++) {
        const c = document.createElement('div');
        c.className = 'confetti';
        c.style.left = Math.random() * 100 + 'vw';
        c.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 50%)`;
        c.style.animation = `fall ${Math.random() * 2 + 1}s linear forwards`;
        document.body.appendChild(c);
        setTimeout(() => c.remove(), 3000);
    }
}

fetch(CSV_URL).then(r => r.text()).then(d => {
    spellingWords = d.split(/\r?\n/).map(w => w.trim().toLowerCase()).filter(w => w.length > 2);
});

function toggleMode() {
    mode = (mode === "math") ? "spelling" : "math";
    document.getElementById("mathArea").style.display = (mode === "math") ? "block" : "none";
    document.getElementById("spellingArea").style.display = (mode === "spelling") ? "block" : "none";
    document.getElementById("modeBtn").innerText = mode === "math" ? "Switch to Spelling" : "Switch to Math";
    nextTask();
}

function nextTask() {
    attempts = 0; penaltyApplied = false;
    document.getElementById("message").innerText = "";
    document.getElementById("visualAid").innerHTML = "";
    if (mode === "math") generateMath(); else generateSpelling();
    updateScore();
}

function generateMath() {
    const ops = ["+", "-", "*", "/"];
    operator = ops[Math.floor(Math.random() * ops.length)];
    if (operator === "+" || operator === "-") {
        num1 = Math.floor(Math.random() * 21) + 10;
        num2 = Math.floor(Math.random() * 15) + 5;
        if (operator === "-" && num2 > num1) [num1, num2] = [num2, num1];
        correctAnswer = (operator === "+") ? num1 + num2 : num1 - num2;
    } else if (operator === "*") {
        num1 = Math.floor(Math.random() * 8) + 2; num2 = Math.floor(Math.random() * 8) + 2;
        correctAnswer = num1 * num2;
    } else {
        num2 = Math.floor(Math.random() * 5) + 2; correctAnswer = Math.floor(Math.random() * 6) + 2;
        num1 = num2 * correctAnswer;
    }
    document.getElementById("mathQuestion").innerText = `${num1} ${operator === '*' ? '×' : (operator === '/' ? '÷' : operator)} ${num2}`;
    document.getElementById("mathInput").value = "";
    document.getElementById("mathInput").focus();
}

function generateSpelling() {
    currentWord = spellingWords[Math.floor(Math.random() * spellingWords.length)];
    const grid = document.getElementById("letterGrid");
    grid.innerHTML = "";
    for (let i = 0; i < currentWord.length; i++) {
        const b = document.createElement("input");
        b.className = "letter-box"; b.maxLength = 1;
        if (i === 0 || i === currentWord.length - 1) { b.value = currentWord[i]; b.disabled = true; }
        else { b.oninput = (e) => { if (e.target.value && i < currentWord.length - 2) grid.children[i+1].focus(); }; }
        grid.appendChild(b);
    }
    setTimeout(() => { if(grid.children[1]) grid.children[1].focus(); sayWord(); }, 400);
}

function sayWord() {
    window.speechSynthesis.cancel();
    let m = new SpeechSynthesisUtterance(currentWord);
    m.rate = 0.7; window.speechSynthesis.speak(m);
}

function showHelp() {
    const aid = document.getElementById("visualAid"); aid.innerHTML = "";
    if (mode === "math") {
        if (operator === "+" || operator === "-") {
            const wrap = document.createElement("div");
            wrap.className = "ten-frame-grid";
            for(let i=0; i<num1; i++) {
                const d = document.createElement("div");
                d.className = (operator === "-" && i < num2) ? "dot dim" : "dot primary";
                wrap.appendChild(d);
            }
            aid.appendChild(wrap);
            if(operator === "+") {
                aid.innerHTML += "<div style='margin:5px'>+</div>";
                const wrap2 = document.createElement("div");
                wrap2.className = "ten-frame-grid";
                for(let i=0; i<num2; i++) {
                    const d = document.createElement("div"); d.className = "dot secondary";
                    wrap2.appendChild(d);
                }
                aid.appendChild(wrap2);
            }
        } else if (operator === "*") {
            const container = document.createElement("div");
            container.className = "math-grid-box";
            for(let r=0; r<num1; r++) {
                const row = document.createElement("div");
                row.className = "grid-row";
                for(let c=0; c<num2; c++) {
                    const d = document.createElement("div"); d.className = "dot primary";
                    row.appendChild(d);
                }
                container.appendChild(row);
            }
            aid.appendChild(container);
        } else if (operator === "/") {
            for(let g=0; g<num2; g++) {
                const grp = document.createElement("div"); grp.className = "division-group";
                for(let i=0; i<correctAnswer; i++) { const d = document.createElement("div"); d.className = "dot primary"; grp.appendChild(d); }
                aid.appendChild(grp);
            }
        }
    } else {
        if (attempts === 2) {
            let mid = Math.floor(Math.random() * (currentWord.length - 2)) + 1;
            let h = currentWord[0];
            for(let i=1; i<currentWord.length-1; i++) h += (i===mid) ? ` ${currentWord[i]} ` : " _ ";
            h += currentWord[currentWord.length-1];
            aid.innerHTML = `<p style='font-size:20px; color:#2196F3; letter-spacing:2px; font-weight:bold;'>${h.toUpperCase()}</p>`;
        } else if (attempts >= 3) {
            aid.innerHTML = `<p style='font-size:22px; color:#4CAF50; letter-spacing:3px; font-weight:bold;'>${currentWord.toUpperCase()}</p>`;
        }
    }
}

function checkAnswer() {
    let userVal = "";
    if (mode === "math") userVal = document.getElementById("mathInput").value;
    else document.querySelectorAll(".letter-box").forEach(b => userVal += b.value);

    if (!userVal) return;
    const correct = (mode === "math") ? (parseInt(userVal) === correctAnswer) : (userVal.toLowerCase() === currentWord);

    if (correct) {
        playSound(true);
        createConfetti();
        let reward = 0;
        if (tokensToday < 300) {
            if (mode === "math" && mathToday < 20) { reward = 10; mathToday++; }
            if (mode === "spelling" && spellToday < 30) { reward = 15; spellToday++; }
        }
        totalTokens += reward; tokensToday += reward;
        document.getElementById("message").style.color = "green";
        document.getElementById("message").innerText = "Bravo Melorin! 🌟";
        updateScore();
        setTimeout(nextTask, 1500);
    } else {
        attempts++;
        playSound(false);
        if (!penaltyApplied) {
            totalTokens = Math.max(0, totalTokens - 3);
            tokensToday = Math.max(0, tokensToday - 3);
            penaltyApplied = true;
            errorLog.push(`${new Date().toLocaleTimeString()}: ${mode === "math" ? mathQuestion.innerText : currentWord} (${userVal})`);
            localStorage.setItem("errorLog", JSON.stringify(errorLog.slice(-20)));
            document.getElementById("message").style.color = "red";
            document.getElementById("message").innerText = "-3 Tokens Penalty 💨";
            updateScore();
        }
        showHelp();
        if (attempts >= 4) {
            document.getElementById("message").innerText = "The answer was: " + (mode === "math" ? correctAnswer : currentWord);
            setTimeout(nextTask, 3000);
        }
    }
}

function updateScore() {
    document.getElementById("mathCount").innerText = mathToday;
    document.getElementById("spellCount").innerText = spellToday;
    document.getElementById("todayTokens").innerText = tokensToday;
    document.getElementById("totalTokens").innerText = totalTokens;
    let progress = (tokensToday / 300) * 100;
    document.getElementById("progressBar").style.width = Math.min(progress, 100) + "%";
    localStorage.setItem("totalTokens", totalTokens);
    localStorage.setItem("mathToday", mathToday);
    localStorage.setItem("spellToday", spellToday);
    localStorage.setItem("tokensToday", tokensToday);
}

function resetPrompt() {
    let b = Math.floor(Math.random()*4)+11;
    if (prompt(`Admin: ${b}x${b}?`) == b*b) {
        let c = prompt("1: Reset Today\n2: Reset Total Balance\n3: Errors");
        if (c=="1") { mathToday = 0; spellToday = 0; tokensToday = 0; }
        else if (c=="2") { totalTokens = 0; mathToday = 0; spellToday = 0; tokensToday = 0; }
        else if (c=="3") alert(errorLog.join("\n") || "No errors!");
        updateScore();
    }
}
updateScore(); nextTask();
</script>
</body>
</html>
