<!DOCTYPE html>
<html>
<head>
  <title>Learning Rewards</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: 'Segoe UI', Arial, sans-serif; text-align: center; background: #f0f2f5; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
    .box { background: white; padding: 30px 20px; width: 90%; max-width: 400px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); position: relative; min-height: 450px; }
    .question { font-size: 32px; font-weight: bold; margin: 20px 0; color: #333; min-height: 50px; display: flex; align-items: center; justify-content: center; flex-direction: column; }
    .word-hint { font-size: 24px; letter-spacing: 8px; color: #555; margin-bottom: 10px; font-family: monospace; }
    input { font-size: 22px; padding: 12px; width: 85%; border: 2px solid #ddd; border-radius: 8px; margin-bottom: 15px; outline: none; text-align: center; text-transform: lowercase; }
    input:focus { border-color: #4CAF50; }
    button { font-size: 16px; padding: 12px 24px; background-color: #4CAF50; color: white; border: none; border-radius: 8px; cursor: pointer; margin: 5px; font-weight: bold; }
    #speakBtn { background-color: #2196F3; font-size: 28px; padding: 15px 50px; border-radius: 50px; }
    #modeBtn { background-color: #9c27b0; margin-bottom: 15px; font-size: 12px; padding: 8px 15px; }
    #message { margin-top: 10px; font-weight: bold; min-height: 48px; line-height: 1.4; font-size: 18px; }
    #score { color: #555; font-size: 13px; background: #eee; padding: 8px 15px; border-radius: 20px; display: inline-block; margin-top: 10px; font-weight: 600; line-height: 1.5; }
    #resetBtn { position: absolute; bottom: 10px; left: 10px; font-size: 10px; padding: 5px 8px; background: #f0f0f0; color: #aaa; border: 1px solid #ddd; border-radius: 4px; }
  </style>
</head>
<body>

<div class="box">
  <button id="modeBtn" onclick="toggleMode()">Switch to Spelling</button>
  <h2 style="margin-top:0;">Reward Zone 💰</h2>

  <div id="mathArea">
    <div class="question" id="question"></div>
  </div>

  <div id="spellingArea" style="display:none;">
    <div class="question">
        <div class="word-hint" id="wordHint">_ _ _ _ _</div>
        <button id="speakBtn" onclick="sayWord()">🔊</button>
    </div>
  </div>

  <br>
  <input type="text" id="answer" placeholder="Type here..." autocomplete="off">
  <br>
  <button onclick="checkAnswer()">Submit</button>
  <br>
  <button id="skipBtn" onclick="nextTask()" style="display:none; background:#ff9800;">Try another</button>
  
  <div id="score"></div>
  <p id="message"></p>
  <button id="resetBtn" onclick="resetPrompt()">Reset / Logs</button>
</div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT6laLcpDJNQ4Lo99PY6WixZYa-I7DQJjskjc1teW22s2YQtcLBRmKPs6g94xQ7Du9FxuXGFYksIwst/pub?gid=0&single=true&output=csv';

let mode = "math"; 
let num1, num2, operator, correctAnswer, currentQuestionText;
let spellingWords = ["apple"]; 
let currentWord = "";
let attempts = 0;
let penaltyApplied = false;

// State
let score = parseFloat(localStorage.getItem("balance")) || 0;
let dailyMathDone = parseInt(localStorage.getItem("mathToday")) || 0;
let dailySpellDone = parseInt(localStorage.getItem("spellToday")) || 0;
let errorLog = JSON.parse(localStorage.getItem("errorLog")) || [];
let today = new Date().toDateString();

if (localStorage.getItem("date") !== today) {
  dailyMathDone = 0;
  dailySpellDone = 0;
  localStorage.setItem("date", today);
}

fetch(CSV_URL).then(res => res.text()).then(data => {
    spellingWords = data.split(/\r?\n/).map(w => w.trim()).filter(w => w.length > 1);
});

function updateScore() {
  document.getElementById("score").innerHTML = 
    `Balance: $${score.toFixed(2)}<br>` +
    `Today's Rewards: Math (${dailyMathDone}/20) | Spelling (${dailySpellDone}/10)`;
  
  localStorage.setItem("balance", score.toFixed(2));
  localStorage.setItem("mathToday", dailyMathDone);
  localStorage.setItem("spellToday", dailySpellDone);
}

function toggleMode() {
    mode = (mode === "math") ? "spelling" : "math";
    document.getElementById("modeBtn").innerText = (mode === "math") ? "Switch to Spelling" : "Switch to Math";
    document.getElementById("mathArea").style.display = (mode === "math") ? "block" : "none";
    document.getElementById("spellingArea").style.display = (mode === "spelling") ? "block" : "none";
    nextTask();
}

function nextTask() {
    attempts = 0;
    penaltyApplied = false;
    document.getElementById("skipBtn").style.display = "none";
    document.getElementById("answer").value = "";
    document.getElementById("message").innerText = "";
    document.getElementById("answer").focus();

    if (mode === "math") {
        document.getElementById("answer").type = "number";
        generateMath();
    } else {
        document.getElementById("answer").type = "text";
        generateSpelling();
    }
}

function generateMath() {
    let ops = ["+", "-"];
    operator = ops[Math.floor(Math.random() * ops.length)];
    num1 = Math.floor(Math.random() * 11) + 10; 
    num2 = Math.floor(Math.random() * 10) + 5;
    if (operator === "-" && num2 > num1) [num1, num2] = [num2, num1];
    correctAnswer = (operator === "+") ? num1 + num2 : num1 - num2;
    currentQuestionText = `${num1} ${operator} ${num2}`;
    document.getElementById("question").innerText = currentQuestionText;
}

function generateSpelling() {
    currentWord = spellingWords[Math.floor(Math.random() * spellingWords.length)].toLowerCase();
    
    // Create Hint: First letter + underscores + last letter
    let hint = currentWord[0];
    for(let i=1; i < currentWord.length - 1; i++) {
        hint += " _";
    }
    hint += " " + currentWord[currentWord.length - 1];
    
    document.getElementById("wordHint").innerText = hint;
    currentQuestionText = "Spelling: " + currentWord;
    setTimeout(sayWord, 400);
}

function sayWord() {
    window.speechSynthesis.cancel();
    let msg = new SpeechSynthesisUtterance(currentWord);
    msg.rate = 0.75;
    window.speechSynthesis.speak(msg);
}

function checkAnswer() {
    let input = document.getElementById("answer").value.trim().toLowerCase();
    if (!input) return;

    let isCorrect = (mode === "math") ? (Number(input) === correctAnswer) : (input === currentWord);

    if (isCorrect) {
        let reward = 0;
        let limitReached = false;

        if (mode === "math") {
            if (dailyMathDone < 20) { reward = 0.10; dailyMathDone++; }
            else limitReached = true;
        } else {
            if (dailySpellDone < 10) { reward = 0.15; dailySpellDone++; }
            else limitReached = true;
        }

        score += reward;
        document.getElementById("message").style.color = "green";
        document.getElementById("message").innerText = limitReached ? "Correct! (Daily limit reached)" : `Great job! +$${reward.toFixed(2)}`;
        updateScore();
        setTimeout(nextTask, 1200);
    } else {
        document.getElementById("message").style.color = "red";
        if (!penaltyApplied) {
            score = Math.max(0, score - 0.03);
            penaltyApplied = true;
            updateScore();
            logError(currentQuestionText, input);
            document.getElementById("message").innerText = "Oops! -3¢ penalty. Look closer!";
        } else {
            document.getElementById("message").innerText = (attempts >= 2) ? `It was: ${mode === "math" ? correctAnswer : currentWord}` : "Try again!";
            if (attempts >= 2) document.getElementById("skipBtn").style.display = "inline-block";
        }
    }
    attempts++;
}

function logError(q, w) {
    let time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    errorLog.push(`${time}: ${q} -> Typed: ${w}`);
    localStorage.setItem("errorLog", JSON.stringify(errorLog.slice(-20)));
}

function resetPrompt() {
    let base = Math.floor(Math.random() * 5) + 11;
    if (prompt(`Grown ups: ${base} x ${base}?`) == (base*base)) {
        let c = prompt("1: Reset Today's Limits | 2: Reset All Balance | 3: View Errors");
        if (c=="1") { dailyMathDone = 0; dailySpellDone = 0; }
        if (c=="2") { score = 0; dailyMathDone = 0; dailySpellDone = 0; }
        if (c=="3") alert(errorLog.join("\n") || "No errors!");
        updateScore();
    }
}

updateScore();
nextTask();
</script>
</body>
</html>
